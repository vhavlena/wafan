# Example: negated operators (!@rx) and their interactions.
#
# Rule 5100: fires when ARGS does NOT contain "safe"       (!@rx safe)
# Rule 5200: fires when ARGS does NOT contain "safe|ok"    (!@rx safe|ok)
# Rule 5300: fires on any non-empty ARGS                   (@rx .+)
#
# Under anchored full-match semantics (z3-noodler):
#   L(!@rx safe)     = all strings except "safe"
#   L(!@rx safe|ok)  = all strings except "safe" and "ok"
#   L(@rx .+)        = all non-empty strings
#
# Mathematically expected subsumption:
#   rule 5200 ⊆ rule 5100
#     (not matching "safe|ok" implies not matching "safe", since L(5200) ⊆ L(5100))
#
# Actual wafan output (--analysis subsumption):
#   No subsumed pairs  (z3-noodler limitation on negated-regex queries)
#
# Mathematically expected intersection:
#   5100 ∩ 5200: non-empty (e.g., "" or "anything" not in {"safe","ok"})
#   5100 ∩ 5300: non-empty (e.g., "anything" not "safe" but non-empty)
#   5200 ∩ 5300: non-empty (e.g., "anything" not in {"safe","ok"} and non-empty)
#
# Actual wafan output (--analysis intersection):
#   5100 ∩ 5200: INTERSECTING  ✓
#   5100 ∩ 5300: INTERSECTING  ✓
#   5200 ∩ 5300: INTERSECTING  ✓

SecRule ARGS "!@rx safe" \
    "id:5100,\
    phase:2,\
    deny,\
    msg:'ARGS does not contain safe'"

SecRule ARGS "!@rx safe|ok" \
    "id:5200,\
    phase:2,\
    deny,\
    msg:'ARGS does not contain safe or ok'"

SecRule ARGS "@rx .+" \
    "id:5300,\
    phase:2,\
    deny,\
    msg:'Non-empty ARGS (positive catch-all)'"
