# Example: t:urlDecode used to defeat percent-encoded SQL injection payloads.
#
# Rule 800 blocks "union select" in ARGS *after* URL-decoding, catching
# both the literal form and percent-encoded evasions such as
# "union%20select", "uni%6fn%20sel%65ct", or "%75nion+select".
# Rule 801 applies the same pattern WITHOUT the transform, so it only
# fires when the literal bytes "union select" are already present.
# Rule 802 additionally lowercases after URL-decoding, catching mixed-case
# evasions such as "%55NION+SELECT" or "union%20SELECT".
#
# Mathematically expected subsumption (--analysis subsumption):
#   rule 801 ⊆ rule 800  (any input matching "union select" literally also
#     matches after urlDecode, since decoding a string with no %XX or +
#     sequences is a no-op)
#   rule 802 ⊆ rule 800  (lowercase collapses the input further; anything
#     matching "union select" after urlDecode+lowercase also matches after
#     urlDecode alone — FALSE: "UNION SELECT" decodes unchanged but is caught
#     by 802 via lowercase and not by 800; no subsumption expected here)
#
# Mathematically expected intersection (--analysis intersection):
#   800 ∩ 801  (literal "union select" satisfies both)
#   800 ∩ 802  (literal "union select" satisfies both)
#   801 ∩ 802  (literal "union select" satisfies both)
#
# Use --analysis witness to get a concrete ARGS value that triggers each rule.

SecRule ARGS "@rx union select" \
    "id:800,\
    phase:2,\
    deny,\
    t:none,t:urlDecode,\
    msg:'SQL injection: union select (URL-decoded)'"

SecRule ARGS "@rx union select" \
    "id:801,\
    phase:2,\
    deny,\
    t:none,\
    msg:'SQL injection: union select (no transform)'"

SecRule ARGS "@rx union select" \
    "id:802,\
    phase:2,\
    deny,\
    t:none,t:urlDecode,t:lowercase,\
    msg:'SQL injection: union select (URL-decoded + lowercased)'"
