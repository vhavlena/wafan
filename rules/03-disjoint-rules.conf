# Example: genuinely disjoint rules — anchored patterns with no common match.
#
# Under anchored (full-string) match semantics used by z3-noodler, the
# patterns ^[0-9]+$, ^[a-z]+$ and ^[A-Z]+$ cover disjoint sets of strings.
#
# Expected subsumption (--analysis subsumption):
#   No subsumed pairs  (none of the anchored patterns is a subset of another)
#
# Actual wafan output (--analysis subsumption):
#   No subsumed rule pairs found.  ✓
#
# Expected intersection (--analysis intersection):
#   No intersecting pairs (digit-only ∩ letter-only = ∅ in anchored mode)
#
# Actual wafan output (--analysis intersection):
#   No intersecting rule pairs found.  ✓

SecRule ARGS "@rx ^[0-9]+$" \
    "id:3100,\
    phase:2,\
    deny,\
    msg:'Only digits in ARGS'"

SecRule ARGS "@rx ^[a-z]+$" \
    "id:3200,\
    phase:2,\
    deny,\
    msg:'Only lowercase letters in ARGS'"

SecRule ARGS "@rx ^[A-Z]+$" \
    "id:3300,\
    phase:2,\
    deny,\
    msg:'Only uppercase letters in ARGS'"
