# Example: rules with t:lowercase transform.
#
# All three rules apply t:lowercase before matching, so the analysis
# must check the lowercased form of the input.
#
# Mathematically expected subsumption (--analysis subsumption):
#   rule 2100 ⊆ rule 2200   ("admin" ⊆ "admin|root" after lowercase)
#   rule 2100 ⊆ rule 2300   ("admin" ⊆ ".+" after lowercase)
#   rule 2200 ⊆ rule 2300   ("admin|root" ⊆ ".+" after lowercase)
#
# Actual wafan output (--analysis subsumption):
#   All pairs: unknown
#   REASON: z3-noodler does not support str.lower (the SMT-LIB function
#   used to encode t:lowercase), so all queries fail to parse and the
#   solver returns UNKNOWN.
#
# Actual wafan output (--analysis intersection):
#   All pairs: unknown (same reason — str.lower not supported)

SecRule ARGS "@rx admin" \
    "id:2100,\
    phase:2,\
    deny,\
    t:lowercase,\
    msg:'Admin keyword detected'"

SecRule ARGS "@rx admin|root" \
    "id:2200,\
    phase:2,\
    deny,\
    t:lowercase,\
    msg:'Admin or root keyword detected'"

SecRule ARGS "@rx .+" \
    "id:2300,\
    phase:2,\
    deny,\
    t:lowercase,\
    msg:'Non-empty ARGS after lowercase (catch-all)'"
