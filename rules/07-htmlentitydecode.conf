# Example: t:htmlEntityDecode used to defeat HTML-entity-encoded XSS payloads.
#
# Rule 700 blocks "<script" in ARGS *after* HTML entity decoding, so an
# attacker sending "&lt;script", "&#60;script" or "&#x3C;script" should
# still be caught. Rule 701 is the same pattern WITHOUT the transform, so it
# only matches if the literal bytes "<script" are already present.
#
# Mathematically expected subsumption (--analysis subsumption):
#   rule 701 ⊆ rule 700  (anything matching "<script" literally also matches
#   it after entity-decoding, since decoding "<script" itself is a no-op)
#
# Use --analysis witness to ask the solver for a concrete ARGS value that
# triggers rule 700, e.g. an HTML-entity-encoded "<script" payload.

SecRule ARGS "@rx <script" \
    "id:700,\
    phase:2,\
    deny,\
    t:htmlEntityDecode,\
    msg:'Script tag detected after HTML entity decoding'"

SecRule ARGS "@rx <script" \
    "id:701,\
    phase:2,\
    deny,\
    msg:'Script tag detected (no decoding)'"
