# Example: rules on different variables (ARGS vs REQUEST_URI).
#
# The tool skips pairs that target disjoint sets of variables.
# Only rules on the same variable are analysed against each other.
#
# Expected subsumption (--analysis subsumption):
#   rule 4200 ⊆ rule 4300  (both on REQUEST_URI; "login" ⊆ "login|logout")
#   Cross-variable pairs (ARGS vs REQUEST_URI) should be skipped.
#
# Actual wafan output (--analysis subsumption):
#   4100 vs 4200: skipped (no shared variable)  ✓
#   4100 vs 4300: skipped (no shared variable)  ✓
#   4200 vs 4300: not subsumed  (z3-noodler negated-regex limitation)
#   No subsumed rule pairs found.
#
# Expected intersection (--analysis intersection):
#   4200 ∩ 4300: INTERSECTING ("login" matches both)
#   Cross-variable pairs: skipped.
#
# Actual wafan output (--analysis intersection):
#   4100 vs 4200: skipped  ✓
#   4100 vs 4300: skipped  ✓
#   4200 ∩ 4300: INTERSECTING  ✓

SecRule ARGS "@rx login" \
    "id:4100,\
    phase:2,\
    deny,\
    msg:'Login keyword in ARGS'"

SecRule REQUEST_URI "@rx login" \
    "id:4200,\
    phase:1,\
    deny,\
    msg:'Login in URI'"

SecRule REQUEST_URI "@rx login|logout" \
    "id:4300,\
    phase:1,\
    deny,\
    msg:'Login or logout in URI'"
