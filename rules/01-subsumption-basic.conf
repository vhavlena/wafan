# Example: basic subsumption — narrower patterns subsumed by broader ones.
#
# Mathematically expected subsumption (--analysis subsumption):
#   rule 1100 ⊆ rule 1200   ("select" ⊆ "select|insert|delete")
#   rule 1100 ⊆ rule 1400   ("select" ⊆ ".+")
#   rule 1200 ⊆ rule 1400   ("select|insert|delete" ⊆ ".+")
#   rule 1300 ⊆ rule 1400   ("union" ⊆ ".+")
#
# Actual wafan output (--analysis subsumption):
#   No subsumed pairs found.
#   NOTE: z3-noodler returns SAT (not subsumed) for queries involving
#   (not (str.in_re x (re.from_ecma2020 ...))) — a known limitation.
#
# Mathematically expected intersection (--analysis intersection):
#   1100 ∩ 1200  (select ∈ select|insert|delete)
#   1100 ∩ 1400  (select is non-empty)
#   1200 ∩ 1400  (select|insert|delete is non-empty)
#   1300 ∩ 1400  (union is non-empty)
#   1100 ∩ 1300  disjoint ("select" ≠ "union" under anchored full-match)
#   1200 ∩ 1300  disjoint ("select|insert|delete" ∩ "union" = ∅ under full-match)
#
# Actual wafan output (--analysis intersection):
#   INTERSECTING: 1100∩1200, 1100∩1400, 1200∩1400, 1300∩1400  ✓
#   Disjoint:     1100∩1300, 1200∩1300                          ✓

SecRule ARGS "@rx select" \
    "id:1100,\
    phase:2,\
    deny,\
    msg:'SQL keyword: select'"

SecRule ARGS "@rx select|insert|delete" \
    "id:1200,\
    phase:2,\
    deny,\
    msg:'SQL keywords: select/insert/delete'"

SecRule ARGS "@rx union" \
    "id:1300,\
    phase:2,\
    deny,\
    msg:'SQL keyword: union'"

SecRule ARGS "@rx .+" \
    "id:1400,\
    phase:2,\
    deny,\
    msg:'Non-empty ARGS (catch-all)'"
