# Complex, realistic patterns across three thematic groups.
#
# All rules use anchored patterns (^...$) so the full-string match
# semantics of z3-noodler's re.from_ecma2020 are unambiguous.
#
# ──────────────────────────────────────────────────────────────────
# GROUP A: OS command injection (ARGS)
# ──────────────────────────────────────────────────────────────────
#
# Pattern hierarchy (mathematically):
#   7100 ⊆ 7200 ⊆ 7300   (nested enumeration of OS commands)
#   7300 ⊆ 7400           (commands-only ⊆ commands-with-optional-flags)
#   7100 ⊆ 7400           (by transitivity)
#   7300 ⊆ 7500           (all enumerated cmds match the generic word pattern)
#
# Intersection analysis (--analysis intersection), verified with z3-noodler:
#   7100 ∩ 7200  SAT  (e.g. "cat")
#   7100 ∩ 7300  SAT  (e.g. "cat")
#   7200 ∩ 7300  SAT  (e.g. "whoami")
#   7300 ∩ 7400  SAT  (e.g. "cat")
#   7100 ∩ 7400  SAT  (e.g. "cat")
#   7300 ∩ 7500  SAT  (e.g. "cat")
#   (all other pairs also SAT — every element of 7100 is in every superset)

# Subset 1 — basic read-only recon commands (no arguments)
SecRule ARGS "@rx ^(?:cat|ls|pwd|id)$" \
    "id:7100,\
    phase:2,\
    deny,\
    msg:'Basic OS recon command in ARGS'"

# Subset 2 — extended read-only recon commands
SecRule ARGS "@rx ^(?:cat|ls|pwd|id|whoami|hostname|uname)$" \
    "id:7200,\
    phase:2,\
    deny,\
    msg:'Extended OS recon command in ARGS'"

# Subset 3 — all suspicious commands (read-only and destructive), bare
SecRule ARGS "@rx ^(?:cat|ls|pwd|id|whoami|hostname|uname|rm|mv|cp|chmod|chown)$" \
    "id:7300,\
    phase:2,\
    deny,\
    msg:'Suspicious OS command in ARGS (no args)'"

# Superset — same commands, optionally followed by one or more flag words
# (e.g. "rm -rf", "chmod +x", "ls -la")
SecRule ARGS "@rx ^(?:cat|ls|pwd|id|whoami|hostname|uname|rm|mv|cp|chmod|chown)(?:\s+-\w+)*$" \
    "id:7400,\
    phase:2,\
    deny,\
    msg:'Suspicious OS command with optional flags in ARGS'"

# Generic short-word pattern — catches any 2-16-char lowercase token
# (broader catch-all; intersects all of the above)
SecRule ARGS "@rx ^[a-z][a-z0-9_-]{1,15}$" \
    "id:7500,\
    phase:2,\
    deny,\
    msg:'Short lowercase identifier in ARGS (generic)'"


# ──────────────────────────────────────────────────────────────────
# GROUP B: Sensitive file-path disclosure (REQUEST_URI)
# ──────────────────────────────────────────────────────────────────
#
# Pattern hierarchy (mathematically):
#   7600 ⊆ 7700 ⊆ 7800   (specific file ⊆ enumerated files ⊆ any /etc/ path)
#   7700 ⊆ 7900           (/etc/ files ⊆ any system-directory path)
#   7800 ⊆ 7900
#
# Intersection analysis, verified with z3-noodler:
#   7600 ∩ 7700  SAT  (/etc/passwd matches both)
#   7610 ∩ 7700  SAT  (/etc/shadow matches both)
#   7600 ∩ 7800  SAT  (/etc/passwd matches)
#   7700 ∩ 7800  SAT  (/etc/passwd matches)
#   7700 ∩ 7900  SAT  (/etc/passwd matches)
#   7800 ∩ 7900  SAT  (/etc/passwd matches)
#
#   Disjoint pairs:
#   7600 ∩ 7610  UNSAT  (/etc/passwd ≠ /etc/shadow under full-string match)
#   7600 ∩ 7950  UNSAT  (/etc/passwd ∉ /proc/… family)

# Single high-priority file — /etc/passwd
SecRule REQUEST_URI "@rx ^/etc/passwd$" \
    "id:7600,\
    phase:1,\
    deny,\
    msg:'Direct access to /etc/passwd'"

# Single high-priority file — /etc/shadow
SecRule REQUEST_URI "@rx ^/etc/shadow$" \
    "id:7610,\
    phase:1,\
    deny,\
    msg:'Direct access to /etc/shadow'"

# Enumerated sensitive /etc/ files
SecRule REQUEST_URI "@rx ^/etc/(?:passwd|shadow|hosts|sudoers|group|crontab)$" \
    "id:7700,\
    phase:1,\
    deny,\
    msg:'Access to well-known sensitive /etc/ file'"

# Any file directly under /etc/ (one path component, no subdirs)
SecRule REQUEST_URI "@rx ^/etc/[a-z][a-z0-9_./-]*$" \
    "id:7800,\
    phase:1,\
    deny,\
    msg:'Access to arbitrary /etc/ path'"

# Any path under a sensitive root directory (/etc, /proc, /sys, /var)
SecRule REQUEST_URI "@rx ^/(?:etc|proc|sys|var)/.*$" \
    "id:7900,\
    phase:1,\
    deny,\
    msg:'Access to sensitive system directory'"

# /proc/self/environ — disjoint from all /etc/ rules
SecRule REQUEST_URI "@rx ^/proc/self/environ$" \
    "id:7950,\
    phase:1,\
    deny,\
    msg:'Access to /proc/self/environ (environment variable leakage)'"


# ──────────────────────────────────────────────────────────────────
# GROUP C: Numeric and hex encoding detection (ARGS)
# ──────────────────────────────────────────────────────────────────
#
# Pattern hierarchy (mathematically):
#   8000 ⊆ 8100 ⊆ 8200   (decimal ⊆ lowercase-hex ⊆ any-case-hex)
#   8200 and 8400 overlap but neither is a subset of the other
#     (8200 allows 1-char strings, 8400 requires ≥2; both require hex)
#   8300 is DISJOINT from 8000, 8100, 8200, 8400
#     (8300 requires "0x" prefix; others require no "0x")
#
# Intersection analysis, verified with z3-noodler:
#   8000 ∩ 8100  SAT  (e.g. "9")
#   8000 ∩ 8200  SAT  (e.g. "9")
#   8100 ∩ 8200  SAT  (e.g. "a")
#   8200 ∩ 8400  SAT  (e.g. "ff" or "1a")
#   8000 ∩ 8300  UNSAT  (decimal ∩ 0x-prefix = ∅)
#   8100 ∩ 8300  UNSAT  (lowercase hex ∩ 0x-prefix = ∅)
#   8200 ∩ 8300  UNSAT  (any-case hex ∩ 0x-prefix = ∅)
#   8400 ∩ 8300  UNSAT  (2+-char hex ∩ 0x-prefix = ∅)

# Decimal-only integers
SecRule ARGS "@rx ^[0-9]+$" \
    "id:8000,\
    phase:2,\
    deny,\
    msg:'Decimal integer in ARGS'"

# Lowercase hexadecimal (no prefix)
SecRule ARGS "@rx ^[0-9a-f]+$" \
    "id:8100,\
    phase:2,\
    deny,\
    msg:'Lowercase hex string in ARGS (no 0x prefix)'"

# Any-case hexadecimal (no prefix)
SecRule ARGS "@rx ^[0-9a-fA-F]+$" \
    "id:8200,\
    phase:2,\
    deny,\
    msg:'Hex string in ARGS (any case, no prefix)'"

# 0x-prefixed hex literal (C/Python style)
SecRule ARGS "@rx ^0x[0-9a-fA-F]+$" \
    "id:8300,\
    phase:2,\
    deny,\
    msg:'0x-prefixed hex literal in ARGS'"

# Any-case hex, at least 2 characters (long enough to be an encoded byte)
SecRule ARGS "@rx ^[0-9a-fA-F]{2,}$" \
    "id:8400,\
    phase:2,\
    deny,\
    msg:'Multi-byte hex string in ARGS (≥2 hex chars)'"
