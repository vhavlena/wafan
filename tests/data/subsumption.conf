# Test fixture for subsumption analysis.
#
# Expected subsumption (regex only, same variable ARGS):
#   100 subsumed by 200  (foo ⊆ foo|bar)
#   100 subsumed by 400  (foo ⊆ .+)
#   200 subsumed by 400  (foo|bar ⊆ .+)
#   300 subsumed by 400  (baz ⊆ .+)
#   500 subsumed by 500  (equivalent rules)
#
# NOT subsumed:
#   200 not subsumed by 100  ("bar" matches 200 but not 100)
#   300 not subsumed by 100/200
#   400 not subsumed by any narrower rule

SecRule ARGS "@rx foo" \
    "id:100,\
    phase:1,\
    deny"

SecRule ARGS "@rx foo|bar" \
    "id:200,\
    phase:1,\
    deny"

SecRule ARGS "@rx baz" \
    "id:300,\
    phase:1,\
    deny"

SecRule ARGS "@rx .+" \
    "id:400,\
    phase:1,\
    deny"

# Rule with lowercase transform: equivalent to 100 after lowercasing
SecRule ARGS "@rx foo" \
    "id:500,\
    phase:1,\
    deny,\
    t:lowercase"

# Rule on a different variable – should not be paired with ARGS rules for subsumption
SecRule RESPONSE_BODY "@rx foo" \
    "id:600,\
    phase:4,\
    deny"
