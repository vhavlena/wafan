name: Python tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Pre-fetch z3-noodler solver
        run: |
          wafan-download-solver
          echo "WAFAN_Z3_PATH=$(python -c 'from wafan.solver_setup import ensure_z3_noodler; print(ensure_z3_noodler())')" >> "$GITHUB_ENV"

      - name: Run tests
        run: pytest